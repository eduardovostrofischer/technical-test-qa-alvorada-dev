<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Document Processing</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 520px;
    margin: 40px auto;
    padding: 0 16px;
  }

  h1 { font-size: 20px; }

  input, button {
    padding: 8px;
    margin: 6px 0;
    width: 100%;
    box-sizing: border-box;
  }

  button { cursor: pointer; }

  pre {
    background: #f5f5f5;
    padding: 12px;
    overflow: auto;
  }

  .row { margin-bottom: 12px; }
</style>
</head>

<body>
<h1>Mock Document Processor</h1>

<div class="row">
  <label>Document ID</label>
  <input id="documentId" value="doc_8f3a92k" />
</div>

<button onclick="startProcessing()">Start Processing</button>

<div class="row">
  <label>Job ID</label>
  <input id="jobId" placeholder="job id will appear here" />
</div>

<button onclick="checkStatus()">Check Status</button>

<h3>Response</h3>
<pre id="output">—</pre>

<script>
const API_BASE = "http://localhost:3001";
const TOKEN = "my-secret-token";

function setOutput(data) {
  document.getElementById("output").textContent =
    typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

async function startProcessing() {
  const documentId = document.getElementById("documentId").value.trim();
  if (!documentId) return setOutput("Enter a documentId");

  try {
    const res = await fetch(`${API_BASE}/v1/documents/${documentId}/process`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${TOKEN}`
      }
    });

    const data = await res.json();
    setOutput(data);

    if (data.jobId) {
      document.getElementById("jobId").value = data.jobId;
    }
  } catch (err) {
    setOutput("Request failed");
  }
}

async function checkStatus() {
  const jobId = document.getElementById("jobId").value.trim();
  if (!jobId) return setOutput("Enter a jobId");

  try {
    const res = await fetch(`${API_BASE}/v1/processing/${jobId}`, {
      headers: {
        "Authorization": `Bearer ${TOKEN}`
      }
    });

    const data = await res.json();
    setOutput(data);
  } catch (err) {
    setOutput("Request failed");
  }
}
</script>

</body>
</html>
